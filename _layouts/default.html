<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | FiberFeasts</title>
    <!-- Soup Ladle SVG Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path d='M50 10 L30 38' stroke='%2310b981' stroke-width='5' stroke-linecap='round'/><path d='M16 34 A 12 12 0 0 0 40 34 Z' fill='%2310b981'/></svg>">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script>
        // Enable manual class-based dark mode toggling in Tailwind CSS
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Outfit', sans-serif; transition: background-color 0.3s, color 0.3s; }
        
        /* Dropdown transition */
        .dropdown-menu {
            opacity: 0;
            transform: translateY(10px);
            pointer-events: none;
            transition: all 0.2s ease-out;
        }
        .dropdown-container:hover .dropdown-menu,
        .dropdown-container:focus-within .dropdown-menu {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased flex flex-col min-h-screen selection:bg-emerald-200 transition-colors duration-300 dark:bg-slate-950 dark:text-slate-100">

    <!-- Dynamically Inject the Common Navbar Include -->
    {% include navbar.html %}

    <!-- Inject Individual Page Content -->
    {{ content }}

    <!-- Custom Pop-up Modal (Avoids ugly alerts, shared globally) -->
    <div id="custom-modal" class="hidden fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
        <div class="bg-white dark:bg-slate-900 max-w-md w-full rounded-3xl p-6 border border-slate-200 dark:border-slate-800 shadow-2xl relative">
            <h4 id="modal-title" class="text-2xl font-extrabold text-slate-900 dark:text-white mb-4"></h4>
            <p id="modal-desc" class="text-slate-600 dark:text-slate-400 leading-relaxed text-sm mb-6"></p>
            <button onclick="closeModal()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 px-6 rounded-full transition-colors shadow">Got it!</button>
        </div>
    </div>

    <!-- Clean Shared Footer -->
    <footer class="mt-auto w-full py-12 text-center bg-slate-900 text-slate-400 border-t border-slate-800 no-print">
        <div class="max-w-4xl mx-auto px-4">
            <p class="text-white font-extrabold text-xl mb-4">🌾 FiberFeasts</p>
            <p class="text-slate-500 text-sm mb-6 font-medium">&copy; 2026. Eat well, live well.</p>
            <div class="flex justify-center space-x-6 text-sm font-bold">
                <a href="/" class="text-slate-300 hover:text-emerald-400 transition-colors">Home</a>
                <a href="/contact/" class="text-emerald-400 transition-colors">Contact</a>
                <a href="/privacy/" class="text-slate-300 hover:text-emerald-400 transition-colors">Privacy Policy</a>
            </div>
        </div>
    </footer>

    <!-- Interactive Scripts for Mobile Drawer, Modals, and Dark Mode Support -->
    <script>
        // --- Mobile navigation drawer controllers ---
        const menuBtn = document.getElementById('mobile-menu-btn');
        const menuCloseBtn = document.getElementById('mobile-menu-close');
        const menuDrawer = document.getElementById('mobile-menu');

        if (menuBtn && menuCloseBtn && menuDrawer) {
            menuBtn.addEventListener('click', () => {
                menuDrawer.classList.remove('hidden');
            });
            menuCloseBtn.addEventListener('click', () => {
                menuDrawer.classList.add('hidden');
            });
        }

        // --- Modal Box Operations (Avoid raw browser alerts) ---
        function alertModal(title, desc) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('custom-modal').classList.add('hidden');
        }

        // --- Dark Mode Switch Engine ---
        const themeBtn = document.getElementById('dark-mode-toggle');
        const themeIcon = document.getElementById('dark-mode-icon');
        const themeBtnMobile = document.getElementById('dark-mode-toggle-mobile');
        const themeIconMobile = document.getElementById('dark-mode-icon-mobile');
        
        function updateThemeElements(isDark) {
            if (isDark) {
                document.documentElement.classList.add('dark');
                if (themeIcon) themeIcon.innerText = "☀️";
                if (themeIconMobile) themeIconMobile.innerText = "☀️";
                localStorage.setItem('theme', 'dark');
            } else {
                document.documentElement.classList.remove('dark');
                if (themeIcon) themeIcon.innerText = "🌙";
                if (themeIconMobile) themeIconMobile.innerText = "🌙";
                localStorage.setItem('theme', 'light');
            }
        }

        // Detect saved or system state on load
        const savedTheme = localStorage.getItem('theme');
        const systemPrefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        updateThemeElements(savedTheme === 'dark' || (!savedTheme && systemPrefersDark));
        
        if (themeBtn) themeBtn.addEventListener('click', toggleTheme);
        if (themeBtnMobile) themeBtnMobile.addEventListener('click', toggleTheme);

        function toggleTheme() {
            const isCurrentlyDark = document.documentElement.classList.contains('dark');
            updateThemeElements(!isCurrentlyDark);
        }
    </script>
</body>
</html>
